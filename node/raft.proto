syntax = "proto3";

package ptypes;

option go_package = "./ptypes";

service Raft {
  rpc RequestVote (VoteRequest) returns (VoteResponse) {}
  rpc AppendEntries (AppendRequest) returns (AppendResponse) {}
}

message VoteRequest {
  int64 term = 1;
  string candidateId = 2;
  int64 lastLogIndex = 3;
  int64 lastLogTerm = 4;
}

message VoteResponse {
  int64 term = 1;
  bool voteGranted = 2;
}

message AppendRequest {
  int64 term = 1;
  string leaderId = 2;
  int64 prevLogIndex = 3;
  int64 prevLogTerm = 4;
  int64 leaderCommit = 5;
  repeated LogEntry entries = 6; 
}

message AppendResponse {
  int64 term = 1;
  bool success = 2;
}

enum Op {
  SET = 0;
  DELETE = 2;
  INCRBY = 3;
  DECRBY = 4;
}

message LogEntry {
  int64 term = 1;
  Op op = 2;
  string key = 3;
  Value value = 4;
}

message Value {
  ValueType type = 1;
  string string = 2;
  int64 number = 3;
  repeated Value array = 4;
  bool isNull = 5;
}

enum ValueType {
  String = 0;
  Number = 1;
  Array = 2;
}

message HashTable {
  map<string, Value> data = 1;
}