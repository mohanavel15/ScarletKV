version: "3.1"
services:
  node:
    build: ./node
    hostname: "node"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "5000"
    networks:
      - locnet
    deploy:
      replicas: 5
      resources:
        limits:
          memory: '512M'
          cpus: '1'

networks:
  locnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.150.3.0/24
